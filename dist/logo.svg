<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="mainGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3b82f6" /> <!-- Blue-500 -->
            <stop offset="100%" stop-color="#8b5cf6" /> <!-- Violet-500 -->
        </linearGradient>
    </defs>
    
    <!-- Central Hexagon Structure representing Core Infrastructure -->
    <path d="M100 40 L152 70 V130 L100 160 L48 130 V70 Z" 
          stroke="url(#mainGrad)" stroke-width="12" stroke-linejoin="round" fill="none"/>
    
    <!-- Internal connections representing 'All/Universal' -->
    <path d="M100 40 V160 M48 70 L152 130 M152 70 L48 130" 
          stroke="url(#mainGrad)" stroke-width="8" stroke-linecap="round"/>
          
    <!-- Nodes at intersections -->
    <circle cx="100" cy="100" r="14" fill="url(#mainGrad)"/>
    <circle cx="100" cy="40" r="8" fill="#3b82f6"/>
    <circle cx="152" cy="70" r="8" fill="#6366f1"/>
    <circle cx="152" cy="130" r="8" fill="#8b5cf6"/>
    <circle cx="100" cy="160" r="8" fill="#8b5cf6"/>
    <circle cx="48" cy="130" r="8" fill="#6366f1"/>
    <circle cx="48" cy="70" r="8" fill="#3b82f6"/>
</svg>
